specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Luma AI
providerId: luma-ai
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- Video Generation
- Image Generation
- 3D
- Dream Machine
- Multimodal
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps view of Luma AI Dream Machine API. Build-tier is per-second video
  ($0.08/s for Ray-2) and per-request/per-pixel image generation. Scale-tier is provisioned
  throughput at $2,100-$3,800/month per unit (8-unit minimum). Note that Dream Machine
  consumer credits do not transfer to API.
notes: Right-size between Build (PAYG) and Scale (provisioned) based on predictable monthly burn.
sources:
- https://lumalabs.ai/dream-machine/api
- https://docs.lumalabs.ai/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Luma AI
serviceCategory: AI
billingModel:
  pricingCategory: Usage + Provisioned Throughput
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Luma Dream Machine API
  ServiceCategory: AI
  ProviderName: Luma AI
  PublisherName: Luma AI
  InvoiceIssuerName: Luma AI
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: video_seconds
  description: Seconds of generated video (Ray series).
  unit: second
  aggregation: sum
  dimensions:
  - account
  - model
- name: image_requests
  description: Per-request image generation/edit calls (uni-1 Photon).
  unit: request
  aggregation: sum
  dimensions:
  - account
  - model
  - operation
- name: image_pixels
  description: Million-pixel-based Photon image billing.
  unit: million_pixels
  aggregation: sum
  dimensions:
  - account
- name: provisioned_units
  description: Reserved capacity units on Scale plans.
  unit: unit-month
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track video seconds and image requests in Luma billing dashboard.
- name: Allocation
  description: Tag generations to creative project / app surface.
- name: Optimization
  description: Pre-purchase Scale capacity if monthly Build burn exceeds Scale break-even.
- name: Accountability
  description: Assign budget owners for Build (variable) vs Scale (committed) allocations.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
